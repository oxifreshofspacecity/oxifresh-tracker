<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Oxi Tracker" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Oxi Fresh Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0e1a; color: #e2e8f0; font-family: 'DM Sans', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #0a0e1a; } ::-webkit-scrollbar-thumb { background: #1e2535; border-radius: 4px; }
    input, select, textarea, button { font-family: inherit; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.4); }
    select option { background: #161b27; color: #e2e8f0; }

    .header { position: sticky; top: 0; z-index: 200; background: #0d1221; border-bottom: 1px solid #1e2535; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, #4f8ef7, #7c5ef7); display: flex; align-items: center; justify-content: center; font-size: 17px; }
    .logo-text { font-size: 14px; font-weight: 700; color: #e2e8f0; line-height: 1.2; }
    .logo-sub { font-size: 10px; color: #475569; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: 4px; display: inline-block; vertical-align: middle; }
    .sync-dot.connected { background: #34d399; }
    .sync-dot.syncing { background: #fbbf24; animation: pulse 1s infinite; }
    .sync-dot.error { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mode-switch { display: flex; background: #161b27; border-radius: 10px; border: 1px solid #1e2535; padding: 3px; gap: 3px; }
    .mode-btn { padding: 6px 13px; border-radius: 7px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .mode-btn.active { background: linear-gradient(135deg, #4f8ef7, #7c5ef7); color: #fff; }
    .mode-btn.inactive { background: transparent; color: #64748b; }
    .nav-actions { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; align-items: center; }
    .nav-btn { padding: 7px 13px; border-radius: 8px; border: 1px solid #1e2535; background: transparent; color: #64748b; font-size: 12px; font-weight: 600; cursor: pointer; }
    .nav-btn.active { border-color: #4f8ef7; background: #4f8ef722; color: #4f8ef7; }
    .add-btn { padding: 7px 15px; border-radius: 8px; border: none; background: linear-gradient(135deg, #4f8ef7, #7c5ef7); color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; }
    .mode-banner { padding: 8px 16px; border-bottom: 1px solid #1e2535; display: flex; align-items: center; gap: 8px; }
    .mode-banner-text { font-size: 12px; font-weight: 600; }
    .mode-banner-count { font-size: 11px; color: #475569; }
    .main { padding: 16px; max-width: 1100px; margin: 0 auto; }

    /* SETUP */
    .setup-banner { background: #fbbf2415; border: 1px solid #fbbf2440; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    .setup-banner h3 { color: #fbbf24; font-size: 14px; margin-bottom: 8px; }
    .setup-banner p { color: #94a3b8; font-size: 13px; line-height: 1.7; }
    .setup-steps { margin: 12px 0; padding-left: 0; list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .setup-steps li { color: #94a3b8; font-size: 12px; padding: 6px 10px; background: #0a0e1a40; border-radius: 8px; }
    .setup-steps li strong { color: #e2e8f0; }
    .setup-input { width: 100%; background: #161b27; border: 1px solid #1e2535; border-radius: 10px; padding: 10px 14px; color: #e2e8f0; font-size: 12px; outline: none; margin-top: 10px; font-family: 'DM Mono', monospace; }
    .setup-input:focus { border-color: #fbbf24; }
    .setup-btn { margin-top: 10px; padding: 10px 22px; border-radius: 10px; border: none; background: #fbbf24; color: #0a0e1a; font-weight: 700; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .setup-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .connect-spinner { width: 14px; height: 14px; border: 2px solid #0a0e1a44; border-top-color: #0a0e1a; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .error-msg { margin-top: 10px; padding: 10px 14px; background: #f8717118; border: 1px solid #f8717140; border-radius: 10px; color: #f87171; font-size: 12px; display: none; }

    /* LOADING */
    .loading-overlay { position: fixed; inset: 0; background: rgba(10,14,26,0.88); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; gap: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #1e2535; border-top-color: #4f8ef7; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loading-text { color: #64748b; font-size: 14px; }

    /* STATS */
    .stats-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-card { background: #161b27; border: 1px solid #1e2535; border-radius: 14px; padding: 16px 18px; flex: 1; min-width: 130px; }
    .stat-label { font-size: 10px; color: #64748b; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
    .stat-sub { font-size: 10px; color: #475569; margin-top: 3px; }
    .charts-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
    .chart-card { background: #161b27; border: 1px solid #1e2535; border-radius: 14px; padding: 16px 18px; flex: 1; min-width: 200px; }
    .chart-title { font-size: 10px; color: #64748b; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 80px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bar-val { font-size: 8px; color: #64748b; font-family: 'DM Mono', monospace; min-height: 12px; }
    .bar-fill { width: 100%; border-radius: 3px 3px 0 0; transition: height 0.4s; }
    .bar-lbl { font-size: 8px; color: #475569; text-align: center; }
    .donut-row { display: flex; gap: 14px; align-items: center; }
    .donut-legend { display: flex; flex-direction: column; gap: 5px; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .legend-name { font-size: 11px; color: #94a3b8; }
    .legend-val { font-size: 10px; font-family: 'DM Mono', monospace; color: #e2e8f0; margin-left: auto; padding-left: 8px; }
    .summary-card { background: #161b27; border: 1px solid #1e2535; border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; }
    .summary-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .summary-item { flex: 1; min-width: 100px; }
    .summary-item-label { font-size: 10px; color: #475569; margin-bottom: 3px; }
    .summary-item-val { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; }

    /* ENTRIES */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
    .filter-btn { padding: 6px 13px; border-radius: 8px; border: 1px solid #1e2535; background: #161b27; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; }
    .filter-btn.active { border-color: #4f8ef7; background: #4f8ef722; color: #4f8ef7; }
    .search-input { margin-left: auto; background: #161b27; border: 1px solid #1e2535; border-radius: 8px; padding: 6px 13px; color: #e2e8f0; font-size: 12px; outline: none; min-width: 160px; }
    .entry-list { display: flex; flex-direction: column; gap: 8px; }
    .entry-card { background: #161b27; border: 1px solid #1e2535; border-radius: 12px; padding: 12px 14px; display: flex; align-items: flex-start; gap: 12px; border-left-width: 3px; }
    .entry-body { flex: 1; min-width: 0; }
    .entry-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
    .entry-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .badge { border-radius: 5px; padding: 2px 7px; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; white-space: nowrap; }
    .entry-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .entry-date { font-size: 11px; color: #475569; }
    .entry-note { font-size: 11px; color: #64748b; font-style: italic; }
    .entry-right { text-align: right; flex-shrink: 0; }
    .entry-amount { font-size: 15px; font-weight: 700; font-family: 'DM Mono', monospace; }
    .entry-actions { display: flex; gap: 5px; margin-top: 5px; justify-content: flex-end; }
    .btn-edit { background: #1e2535; border: none; color: #94a3b8; border-radius: 6px; padding: 3px 9px; font-size: 11px; cursor: pointer; }
    .btn-del { background: #f8717118; border: 1px solid #f8717133; color: #f87171; border-radius: 6px; padding: 3px 9px; font-size: 11px; cursor: pointer; }
    .empty { text-align: center; color: #475569; padding: 40px 0; font-size: 14px; }

    /* MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 16px; }
    .modal { background: #0f1420; border: 1px solid #1e2535; border-radius: 18px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-title { font-size: 16px; font-weight: 700; color: #e2e8f0; }
    .modal-close { background: #1e2535; border: none; color: #94a3b8; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 12px; }
    .field-label { font-size: 10px; color: #64748b; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; display: block; margin-bottom: 5px; }
    .field-input { width: 100%; background: #161b27; border: 1px solid #1e2535; border-radius: 10px; padding: 10px 13px; color: #e2e8f0; font-size: 14px; outline: none; color-scheme: dark; }
    .field-input:focus { border-color: #4f8ef7; }
    .two-col { display: flex; gap: 10px; } .two-col > div { flex: 1; }
    .type-toggle { display: flex; gap: 8px; }
    .type-btn { flex: 1; padding: 9px 0; border-radius: 10px; border: 1px solid; font-weight: 700; font-size: 13px; cursor: pointer; }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-cancel { flex: 1; padding: 11px; border-radius: 10px; border: 1px solid #1e2535; background: transparent; color: #64748b; cursor: pointer; font-weight: 600; }
    .btn-save { flex: 2; padding: 11px; border-radius: 10px; border: none; background: linear-gradient(135deg, #4f8ef7, #7c5ef7); color: #fff; cursor: pointer; font-weight: 700; font-size: 14px; }
    .cat-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .cat-add-input { flex: 1; background: #161b27; border: 1px solid #1e2535; border-radius: 10px; padding: 9px 13px; color: #e2e8f0; font-size: 14px; outline: none; }
    .cat-add-btn { padding: 9px 16px; border-radius: 10px; border: none; background: #4f8ef7; color: #fff; font-weight: 700; cursor: pointer; }
    .cat-grid { display: flex; flex-wrap: wrap; gap: 7px; max-height: 240px; overflow-y: auto; margin-bottom: 14px; }
    .cat-chip { display: flex; align-items: center; gap: 6px; border-radius: 8px; padding: 5px 11px; }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; }
    .cat-name { font-size: 12px; color: #e2e8f0; }
    .cat-remove { background: none; border: none; color: #f87171; cursor: pointer; font-size: 14px; line-height: 1; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
let SCRIPT_URL = localStorage.getItem("oxif_script_url") || "";

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const DEFAULT_BIZ_CATS = ["Meta Ads","Google Ads","Supplies","Labor","Fuel","Franchise Fees","Equipment","Vehicle","Insurance","Food","Misc","Other"];
const DEFAULT_PER_CATS = ["Housing","Food","Transport","Utilities","Entertainment","Healthcare","Misc","Other"];
const CAT_COLORS = {"Meta Ads":"#4f8ef7","Google Ads":"#f7a94f","Supplies":"#a78bfa","Labor":"#34d399","Fuel":"#f87171","Franchise Fees":"#60a5fa","Equipment":"#fbbf24","Vehicle":"#c084fc","Insurance":"#2dd4bf","Food":"#fb923c","Misc":"#94a3b8","Other":"#64748b","Housing":"#f472b6","Transport":"#38bdf8","Utilities":"#4ade80","Entertainment":"#facc15","Healthcare":"#f97316"};
const getColor = c => CAT_COLORS[c] || "#6366f1";
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().slice(0,10);
const fmtCur = n => "$" + Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = s => { if(!s) return ""; const [y,m,d]=s.split("-"); return `${m}/${d}/${y}`; };
function getWeekRange() { const d=new Date(),day=d.getDay(),start=new Date(d); start.setDate(d.getDate()-day); const end=new Date(start); end.setDate(start.getDate()+6); return {start:start.toISOString().slice(0,10),end:end.toISOString().slice(0,10)}; }
function getMonthRange() { const now=new Date(),y=now.getFullYear(),m=now.getMonth(); return {start:new Date(y,m,1).toISOString().slice(0,10),end:new Date(y,m+1,0).toISOString().slice(0,10)}; }
const inRange=(d,s,e)=>d>=s&&d<=e;
const sumAmt=(arr,type)=>arr.filter(e=>!type||e.type===type).reduce((s,e)=>s+(e.amount||0),0);

// ─── STATE ────────────────────────────────────────────────────────────────────
let S = {
  mode:"business", view:"dashboard",
  showForm:false, showCatMgr:false, editing:null,
  entryFilter:"all", search:"",
  bizEntries:[], perEntries:[],
  bizCats:JSON.parse(localStorage.getItem("oxif_biz_cats")||"null")||[...DEFAULT_BIZ_CATS],
  perCats:JSON.parse(localStorage.getItem("oxif_per_cats")||"null")||[...DEFAULT_PER_CATS],
  newCat:"", form:{},
  syncStatus: SCRIPT_URL?"loading":"setup",
  loading:false, loadingMsg:"Loading..."
};
const ents = () => S.mode==="business" ? S.bizEntries : S.perEntries;
const cats = () => S.mode==="business" ? S.bizCats : S.perCats;
const defaultForm = () => ({type:"expense",date:today(),category:cats()[0],amount:"",description:"",note:""});

// ─── API — uses no-cors jsonp-style via script tag trick ──────────────────────
// Google Apps Script requires ?action=X format and returns JSON
// We use fetch with mode:'no-cors' for writes, and a script-tag trick for reads

function apiUrl(params) {
  return SCRIPT_URL + "?" + new URLSearchParams(params).toString();
}

// For GET requests (reading data) — uses jsonp callback pattern
function apiGet(params) {
  return new Promise((resolve) => {
    const cbName = "cb_" + genId();
    const script = document.createElement("script");
    const timer = setTimeout(() => {
      cleanup();
      resolve({success:false, error:"Timeout — check your Script URL and deployment settings."});
    }, 15000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    // Append callback param
    const p = {...params, callback: cbName};
    script.src = apiUrl(p);
    script.onerror = () => { cleanup(); resolve({success:false, error:"Script load error — verify your Web App URL and that access is set to 'Anyone'."}); };
    document.head.appendChild(script);
  });
}

// For write operations (add/update/delete) — uses fetch with no-cors
// We optimistically update UI and fire-and-forget the write
async function apiWrite(params) {
  try {
    // Try regular fetch first (works if CORS is set up)
    const res = await fetch(apiUrl(params), {method:"GET", redirect:"follow"});
    const text = await res.text();
    try { return JSON.parse(text); } catch { return {success:true}; }
  } catch(e) {
    // Fallback: fire-and-forget with no-cors (write still happens, we just don't get response)
    try { fetch(apiUrl(params), {method:"GET", mode:"no-cors", redirect:"follow"}); } catch {}
    return {success:true, warning:"no-cors mode — write sent but response unavailable"};
  }
}

async function loadEntries(mode) {
  try {
    const r = await apiGet({action:"getEntries", mode});
    if(r && r.success) {
      if(mode==="business") S.bizEntries = r.entries || [];
      else S.perEntries = r.entries || [];
      S.syncStatus = "connected";
    } else {
      S.syncStatus = "error";
    }
    return r;
  } catch(e) {
    S.syncStatus = "error";
    return {success:false, error:e.message};
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  if(!SCRIPT_URL) { S.syncStatus="setup"; render(); return; }
  S.loading=true; S.loadingMsg="Connecting to Google Sheets..."; render();
  // Setup sheets
  await apiGet({action:"setup"});
  // Load data
  await loadEntries("business");
  await loadEntries("personal");
  S.loading=false; render();
}

// ─── CONNECT HANDLER (called directly, not via render loop) ───────────────────
async function doSaveScriptUrl() {
  const input = document.getElementById("scriptUrlInput");
  const errEl = document.getElementById("connectError");
  const btn = document.getElementById("connectBtn");
  const spinner = document.getElementById("connectSpinner");

  const url = (input?.value||"").trim();
  if(!url || !url.includes("script.google.com")) {
    errEl.style.display = "block";
    errEl.textContent = "❌ Please paste a valid Google Apps Script URL (should contain script.google.com)";
    return;
  }

  // Show loading state
  btn.disabled = true;
  spinner.style.display = "inline-block";
  btn.querySelector(".btn-label").textContent = "Connecting...";
  errEl.style.display = "none";

  // Save URL
  SCRIPT_URL = url;
  localStorage.setItem("oxif_script_url", url);

  // Test connection via JSONP
  try {
    const result = await apiGet({action:"ping"});
    if(result && result.success) {
      // Connected! Run full init
      await init();
    } else {
      SCRIPT_URL = "";
      localStorage.removeItem("oxif_script_url");
      btn.disabled = false;
      spinner.style.display = "none";
      btn.querySelector(".btn-label").textContent = "🔗 Connect Now";
      errEl.style.display = "block";
      errEl.textContent = "❌ Could not connect: " + (result?.error || "Unknown error. Make sure 'Who has access' is set to Anyone.");
    }
  } catch(e) {
    SCRIPT_URL = "";
    localStorage.removeItem("oxif_script_url");
    btn.disabled = false;
    spinner.style.display = "none";
    btn.querySelector(".btn-label").textContent = "🔗 Connect Now";
    errEl.style.display = "block";
    errEl.textContent = "❌ Connection failed: " + e.message;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("app").innerHTML = `
    ${buildHeader()}
    ${buildBanner()}
    <div class="main">
      ${S.syncStatus==="setup" ? buildSetupBanner() : ""}
      ${S.view==="dashboard" ? buildDashboard() : buildEntries()}
    </div>
    ${S.showForm ? buildFormModal() : ""}
    ${S.showCatMgr ? buildCatModal() : ""}
    ${S.loading ? `<div class="loading-overlay"><div class="spinner"></div><div class="loading-text">${S.loadingMsg}</div></div>` : ""}
  `;
  bindEvents();

  // Re-attach connect button directly (not via delegation) to avoid issues
  const connectBtn = document.getElementById("connectBtn");
  if(connectBtn) connectBtn.addEventListener("click", doSaveScriptUrl);
}

function buildSetupBanner() {
  return `<div class="setup-banner">
    <h3>⚡ Connect to Google Sheets — One-Time Setup</h3>
    <p>Follow these steps exactly to get your Web App URL:</p>
    <ul class="setup-steps">
      <li>1. Open your Google Sheet → click <strong>Extensions → Apps Script</strong></li>
      <li>2. Delete everything in the editor → paste the <strong>Code.gs</strong> content → click <strong>Save 💾</strong></li>
      <li>3. Click <strong>Deploy → New Deployment</strong></li>
      <li>4. Click the gear ⚙️ next to "Select type" → choose <strong>Web App</strong></li>
      <li>5. Execute as: <strong>Me</strong> &nbsp;|&nbsp; Who has access: <strong>Anyone</strong></li>
      <li>6. Click <strong>Deploy</strong> → <strong>Authorize access</strong> → select your Google account → <strong>Allow</strong></li>
      <li>7. Copy the <strong>Web App URL</strong> and paste it below</li>
    </ul>
    <input class="setup-input" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec" value="${localStorage.getItem("oxif_script_url")||""}" />
    <div id="connectError" class="error-msg"></div>
    <button class="setup-btn" id="connectBtn">
      <div class="connect-spinner" id="connectSpinner"></div>
      <span class="btn-label">🔗 Connect Now</span>
    </button>
  </div>`;
}

function buildHeader() {
  const dotCls = {connected:"connected",syncing:"syncing",loading:"syncing",error:"error"}[S.syncStatus]||"";
  const syncLbl = {connected:"✓ Synced to Google Sheets",syncing:"Syncing...",loading:"Connecting...",setup:"Not connected",error:"Sync error — reconnect"}[S.syncStatus]||"";
  return `<div class="header">
    <div class="logo">
      <div class="logo-icon">🧹</div>
      <div>
        <div class="logo-text">Oxi Fresh Tracker <span class="sync-dot ${dotCls}"></span></div>
        <div class="logo-sub">${syncLbl}</div>
      </div>
    </div>
    <div class="mode-switch">
      <button class="mode-btn ${S.mode==="business"?"active":"inactive"}" data-action="setMode" data-val="business">🏢 Business</button>
      <button class="mode-btn ${S.mode==="personal"?"active":"inactive"}" data-action="setMode" data-val="personal">🏠 Personal</button>
    </div>
    <div class="nav-actions">
      <button class="nav-btn ${S.view==="dashboard"?"active":""}" data-action="setView" data-val="dashboard">📊 Dashboard</button>
      <button class="nav-btn ${S.view==="entries"?"active":""}" data-action="setView" data-val="entries">📋 Entries</button>
      <button class="nav-btn" data-action="openCatMgr">⚙️ Categories</button>
      <button class="nav-btn" data-action="refreshData">🔄 Refresh</button>
      <button class="add-btn" data-action="openForm">+ Add Entry</button>
    </div>
  </div>`;
}

function buildBanner() {
  const color=S.mode==="business"?"#4f8ef7":"#34d399";
  return `<div class="mode-banner" style="background:${color}08">
    <span class="mode-banner-text" style="color:${color}">${S.mode==="business"?"🏢 Business Mode — Oxi Fresh Houston":"🏠 Personal Mode"}</span>
    <span class="mode-banner-count">${ents().length} entries</span>
  </div>`;
}

function buildDashboard() {
  const e=ents(),td=today(),wk=getWeekRange(),mo=getMonthRange();
  const todayE=e.filter(x=>x.date===td),weekE=e.filter(x=>inRange(x.date,wk.start,wk.end)),monthE=e.filter(x=>inRange(x.date,mo.start,mo.end));
  const wkNet=sumAmt(weekE,"income")-sumAmt(weekE,"expense"),moNet=sumAmt(monthE,"income")-sumAmt(monthE,"expense");
  const catMap={};monthE.filter(x=>x.type==="expense").forEach(x=>{catMap[x.category]=(catMap[x.category]||0)+x.amount;});
  const catData=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([cat,val])=>({cat,val,color:getColor(cat)}));
  const days=Array.from({length:7},(_,i)=>{ const d=new Date();d.setDate(d.getDate()-(6-i));const ds=d.toISOString().slice(0,10);return{label:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()],val:e.filter(x=>x.date===ds&&x.type==="expense").reduce((s,x)=>s+x.amount,0),isToday:ds===td}; });
  const maxDay=Math.max(...days.map(d=>d.val),1);
  return `
  <div class="stats-grid">
    ${sc("Today Expenses",fmtCur(sumAmt(todayE,"expense")),null,"#f87171")}
    ${sc("Today Income",fmtCur(sumAmt(todayE,"income")),null,"#34d399")}
    ${sc("Week Net",fmtCur(Math.abs(wkNet)),wkNet>=0?"▲ Profit":"▼ Loss",wkNet>=0?"#34d399":"#f87171")}
    ${sc("Month Net",fmtCur(Math.abs(moNet)),moNet>=0?"▲ Profit":"▼ Loss",moNet>=0?"#34d399":"#f87171")}
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Daily Expenses — This Week</div>
      <div class="bar-chart">${days.map(d=>`<div class="bar-col"><div class="bar-val">${d.val>0?"$"+(d.val>=1000?(d.val/1000).toFixed(1)+"k":d.val.toFixed(0)):""}</div><div class="bar-fill" style="height:${Math.max((d.val/maxDay)*60,d.val>0?3:0)}px;background:${d.isToday?"#4f8ef7":"#4f8ef755"}"></div><div class="bar-lbl">${d.label}</div></div>`).join("")}</div>
    </div>
    ${catData.length>0?`<div class="chart-card"><div class="chart-title">Monthly by Category</div><div class="donut-row">${buildDonut(catData)}<div class="donut-legend">${catData.slice(0,5).map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div><span class="legend-name">${d.cat}</span><span class="legend-val">${fmtCur(d.val)}</span></div>`).join("")}</div></div></div>`:""}
  </div>
  <div class="summary-card">
    <div class="chart-title">This Month — Summary</div>
    <div class="summary-row">
      ${[{l:"Total Income",v:fmtCur(sumAmt(monthE,"income")),c:"#34d399"},{l:"Total Expenses",v:fmtCur(sumAmt(monthE,"expense")),c:"#f87171"},{l:"Net P&L",v:(moNet<0?"-":"")+fmtCur(Math.abs(moNet)),c:moNet>=0?"#34d399":"#f87171"},{l:"Transactions",v:monthE.length,c:"#4f8ef7"}].map(x=>`<div class="summary-item"><div class="summary-item-label">${x.l}</div><div class="summary-item-val" style="color:${x.c}">${x.v}</div></div>`).join("")}
    </div>
  </div>`;
}
const sc=(l,v,sub,c)=>`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value" style="color:${c||"#e2e8f0"}">${v}</div>${sub?`<div class="stat-sub">${sub}</div>`:""}</div>`;

function buildDonut(data) {
  const total=data.reduce((s,d)=>s+d.val,0);if(!total)return"";
  const r=40,cx=55,cy=55,circ=2*Math.PI*r;let offset=0;
  const segs=data.map(d=>{const dash=d.val/total*circ,seg={...d,dash,gap:circ-dash,offset};offset+=dash;return seg;});
  return `<svg width="110" height="110" viewBox="0 0 110 110"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e2535" stroke-width="16"/>${segs.map(s=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="16" stroke-dasharray="${s.dash} ${s.gap}" stroke-dashoffset="${-s.offset}" transform="rotate(-90 ${cx} ${cy})"/>`).join("")}<text x="${cx}" y="${cy-5}" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="DM Mono">TOTAL</text><text x="${cx}" y="${cy+9}" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="bold" font-family="DM Mono">$${(total/1000).toFixed(1)}k</text></svg>`;
}

function buildEntries() {
  const filtered=ents().filter(e=>S.entryFilter==="all"||e.type===S.entryFilter).filter(e=>{if(!S.search)return true;const s=S.search.toLowerCase();return(e.description||"").toLowerCase().includes(s)||(e.category||"").toLowerCase().includes(s)||(e.note||"").toLowerCase().includes(s);}).sort((a,b)=>b.date.localeCompare(a.date));
  return `<div class="filter-row">
    ${["all","expense","income"].map(f=>`<button class="filter-btn ${S.entryFilter===f?"active":""}" data-action="setFilter" data-val="${f}">${f==="all"?"All Entries":f==="income"?"💰 Income":"💸 Expenses"}</button>`).join("")}
    <input class="search-input" placeholder="Search..." id="searchInput" value="${S.search}" />
  </div>
  <div class="entry-list">${filtered.length===0?`<div class="empty">${SCRIPT_URL?"No entries yet — tap + Add Entry 👆":"Connect to Google Sheets first ☝️"}</div>`:filtered.map(e=>{const inc=e.type==="income",c=inc?"#34d399":getColor(e.category);return`<div class="entry-card" style="border-left-color:${c}"><div class="entry-body"><div class="entry-top"><span class="entry-name">${e.description||e.category}</span><span class="badge" style="background:${c}22;border:1px solid ${c}44;color:${c}">${e.category}</span></div><div class="entry-meta"><span class="entry-date">${fmtDate(e.date)}</span>${e.note?`<span class="entry-note">📝 ${e.note}</span>`:""}</div></div><div class="entry-right"><div class="entry-amount" style="color:${inc?"#34d399":"#f87171"}">${inc?"+":"-"}${fmtCur(e.amount)}</div><div class="entry-actions"><button class="btn-edit" data-action="editEntry" data-id="${e.id}">Edit</button><button class="btn-del" data-action="deleteEntry" data-id="${e.id}">Del</button></div></div></div>`;}).join("")}</div>`;
}

function buildFormModal() {
  const f=S.form,inc=f.type==="income";
  return `<div class="modal-bg" id="modalBg"><div class="modal"><div class="modal-header"><div class="modal-title">${S.editing?"Edit Entry":`New ${S.mode==="business"?"Business":"Personal"} Entry`}</div><button class="modal-close" data-action="closeForm">×</button></div><div class="form-group"><div><div class="field-label">Type</div><div class="type-toggle"><button class="type-btn" data-action="setFormType" data-val="expense" style="border-color:${!inc?"#f87171":"#1e2535"};background:${!inc?"#f8717122":"#161b27"};color:${!inc?"#f87171":"#475569"}">💸 Expense</button><button class="type-btn" data-action="setFormType" data-val="income" style="border-color:${inc?"#34d399":"#1e2535"};background:${inc?"#34d39922":"#161b27"};color:${inc?"#34d399":"#475569"}">💰 Income</button></div></div><div class="two-col"><div><label class="field-label">Date</label><input type="date" class="field-input" id="formDate" value="${f.date}"/></div><div><label class="field-label">Amount ($)</label><input type="number" min="0" step="0.01" placeholder="0.00" class="field-input" id="formAmount" value="${f.amount}"/></div></div><div><label class="field-label">Category</label><select class="field-input" id="formCategory">${cats().map(c=>`<option value="${c}"${f.category===c?" selected":""}>${c}</option>`).join("")}</select></div><div><label class="field-label">Description</label><input type="text" placeholder="Brief description..." class="field-input" id="formDesc" value="${f.description||""}"/></div><div><label class="field-label">Note / Memo</label><textarea placeholder="Additional notes..." class="field-input" id="formNote" style="min-height:70px;resize:vertical">${f.note||""}</textarea></div><div class="form-actions"><button class="btn-cancel" data-action="closeForm">Cancel</button><button class="btn-save" data-action="saveEntry">${S.editing?"Update Entry":"Save Entry"}</button></div></div></div></div>`;
}

function buildCatModal() {
  return `<div class="modal-bg" id="catModalBg"><div class="modal"><div class="modal-header"><div class="modal-title">Manage ${S.mode==="business"?"Business":"Personal"} Categories</div><button class="modal-close" data-action="closeCatMgr">×</button></div><div class="cat-add-row"><input class="cat-add-input" id="newCatInput" placeholder="New category name..." value="${S.newCat}"/><button class="cat-add-btn" data-action="addCat">Add</button></div><div class="cat-grid">${cats().map(c=>`<div class="cat-chip" style="background:${getColor(c)}18;border:1px solid ${getColor(c)}33"><div class="cat-dot" style="background:${getColor(c)}"></div><span class="cat-name">${c}</span><button class="cat-remove" data-action="removeCat" data-cat="${c}">×</button></div>`).join("")}</div><button class="btn-save" style="width:100%" data-action="closeCatMgr">Done</button></div></div>`;
}

function bindEvents() {
  document.addEventListener("click", handleClick, {once:true});
  const si=document.getElementById("searchInput");if(si)si.addEventListener("input",e=>{S.search=e.target.value;render();});
  const mb=document.getElementById("modalBg");if(mb)mb.addEventListener("click",e=>{if(e.target===mb){S.showForm=false;S.editing=null;render();}});
  const cmb=document.getElementById("catModalBg");if(cmb)cmb.addEventListener("click",e=>{if(e.target===cmb){S.showCatMgr=false;render();}});
  const ni=document.getElementById("newCatInput");if(ni)ni.addEventListener("keydown",e=>{if(e.key==="Enter")doAddCat();});
}

function handleClick(e) {
  const btn=e.target.closest("[data-action]");
  if(!btn){document.addEventListener("click",handleClick,{once:true});return;}
  // Skip connectBtn — handled separately
  if(btn.id==="connectBtn") return;
  const {action,val,id,cat}=btn.dataset;
  ({
    setMode: async()=>{S.mode=val;S.entryFilter="all";S.search="";S.loading=true;S.loadingMsg=`Loading ${val} data...`;render();await loadEntries(val);S.loading=false;render();},
    setView: ()=>{S.view=val;render();},
    openForm: ()=>{if(!SCRIPT_URL){alert("Connect to Google Sheets first.");return;}S.editing=null;S.form=defaultForm();S.showForm=true;render();},
    closeForm: ()=>{S.showForm=false;S.editing=null;render();},
    openCatMgr: ()=>{S.showCatMgr=true;render();},
    closeCatMgr: ()=>{S.showCatMgr=false;S.newCat="";render();},
    setFormType: ()=>{S.form.type=val;render();},
    setFilter: ()=>{S.entryFilter=val;render();},
    saveEntry: doSaveEntry,
    editEntry: ()=>doEditEntry(id),
    deleteEntry: ()=>doDeleteEntry(id),
    addCat: doAddCat,
    removeCat: ()=>doRemoveCat(cat),
    refreshData: async()=>{S.loading=true;S.loadingMsg="Refreshing...";render();await loadEntries(S.mode);S.loading=false;render();}
  }[action]||function(){document.addEventListener("click",handleClick,{once:true});})();
}

function readForm() {
  return{type:S.form.type,date:document.getElementById("formDate")?.value||today(),amount:parseFloat(document.getElementById("formAmount")?.value||"0"),category:document.getElementById("formCategory")?.value||cats()[0],description:document.getElementById("formDesc")?.value?.trim()||"",note:document.getElementById("formNote")?.value?.trim()||""};
}

async function doSaveEntry() {
  const f=readForm();
  if(!f.amount||f.amount<=0){alert("Enter a valid amount.");return;}
  const entry={...f,id:S.editing||genId()};
  S.showForm=false;S.loading=true;S.loadingMsg=S.editing?"Updating...":"Saving...";render();
  if(S.editing){
    if(S.mode==="business")S.bizEntries=S.bizEntries.map(e=>e.id===entry.id?entry:e);
    else S.perEntries=S.perEntries.map(e=>e.id===entry.id?entry:e);
    await apiWrite({action:"updateEntry",mode:S.mode,entry:JSON.stringify(entry)});
  } else {
    if(S.mode==="business")S.bizEntries.unshift(entry);
    else S.perEntries.unshift(entry);
    await apiWrite({action:"addEntry",mode:S.mode,entry:JSON.stringify(entry)});
  }
  S.editing=null;S.loading=false;S.view="entries";render();
}

async function doEditEntry(id){const e=ents().find(x=>x.id===id);if(!e)return;S.editing=id;S.form={...e};S.showForm=true;render();}

async function doDeleteEntry(id){
  if(!confirm("Delete this entry?"))return;
  S.loading=true;S.loadingMsg="Deleting...";render();
  if(S.mode==="business")S.bizEntries=S.bizEntries.filter(e=>e.id!==id);
  else S.perEntries=S.perEntries.filter(e=>e.id!==id);
  await apiWrite({action:"deleteEntry",mode:S.mode,id});
  S.loading=false;render();
}

function doAddCat(){
  const v=(document.getElementById("newCatInput")?.value||"").trim();if(!v)return;
  const cur=cats();if(cur.includes(v)){alert("Already exists.");return;}
  const upd=[...cur,v];
  if(S.mode==="business"){S.bizCats=upd;localStorage.setItem("oxif_biz_cats",JSON.stringify(upd));}
  else{S.perCats=upd;localStorage.setItem("oxif_per_cats",JSON.stringify(upd));}
  S.newCat="";render();
}

function doRemoveCat(cat){
  const cur=cats();if(cur.length<=2){alert("Keep at least 2.");return;}if(!confirm(`Remove "${cat}"?`))return;
  const upd=cur.filter(c=>c!==cat);
  if(S.mode==="business"){S.bizCats=upd;localStorage.setItem("oxif_biz_cats",JSON.stringify(upd));}
  else{S.perCats=upd;localStorage.setItem("oxif_per_cats",JSON.stringify(upd));}
  render();
}

init();
</script>
</body>
</html>
